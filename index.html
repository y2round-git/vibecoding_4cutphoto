<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Photo Booth - 네 컷 사진</title>
    <style>
        :root {
            --primary: #ff4d8d;
            --bg: #f8f9fa;
            --dark: #2d3436;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg);
            color: var(--dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        h1 { font-weight: 700; color: var(--primary); }

        .container {
            display: flex;
            gap: 30px;
            max-width: 1200px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
        }

        .preview-section {
            flex: 1;
            min-width: 400px;
            text-align: center;
            position: relative;
        }

        video {
            width: 100%;
            border-radius: 15px;
            background: #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transform: scaleX(-1);
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        select, button {
            padding: 12px 20px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
        }

        select { background: white; border: 1px solid #ddd; }
        
        .btn-shoot {
            background: var(--primary);
            color: white;
            font-weight: bold;
        }

        .btn-shoot:hover { opacity: 0.8; transform: translateY(-2px); }

        .result-section {
            width: 320px;
            background: white;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            border-radius: 5px;
        }

        .photo-grid {
            display: grid;
            grid-template-rows: repeat(4, 1fr);
            gap: 10px;
        }

        .photo-slot {
            width: 100%;
            aspect-ratio: 3 / 2;
            background: #eee;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .photo-slot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 카운트다운 위치 수정 */
        #countdown {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -100%);
            font-size: 120px;
            color: white;
            font-weight: bold;
            text-shadow: 4px 4px 15px rgba(0,0,0,0.7);
            pointer-events: none;
            display: none;
            z-index: 10;
        }

        .timer-badge {
            margin-top: 10px;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>

    <h1>네 컷 표정사진! 찰칵</h1>
    
    <div class="container">
        <div class="preview-section">
            <video id="video" autoplay playsinline></video>
            <div id="countdown"></div>
            
            <div class="controls">
                <select id="cameraSelect">
                    <option value="">카메라 선택 중...</option>
                </select>
                <button class="btn-shoot" onclick="startShoot(3)">3초 간격 촬영</button>
                <button class="btn-shoot" onclick="startShoot(5)">5초 간격 촬영</button>
                <button class="btn-shoot" onclick="startShoot(10)">10초 간격 촬영</button>
            </div>
            <p class="timer-badge">간격 버튼을 누르면 촬영이 시작되고 완료 시 자동 저장됩니다.</p>
        </div>

        <div class="result-section" id="capture-area">
            <div class="photo-grid" id="final-grid">
                <div class="photo-slot"><img id="pic1" src=""></div>
                <div class="photo-slot"><img id="pic2" src=""></div>
                <div class="photo-slot"><img id="pic3" src=""></div>
                <div class="photo-slot"><img id="pic4" src=""></div>
            </div>
            <div id="date-label" style="text-align: center; margin-top: 20px; font-family: serif; color: #999; letter-spacing: 2px;">
                2026 MEMORIES
            </div>
        </div>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>
    <canvas id="finalCanvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const cameraSelect = document.getElementById('cameraSelect');
        const countdownEl = document.getElementById('countdown');
        let isShooting = false;

        async function getCameras() {
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(device => device.kind === 'videoinput');
                cameraSelect.innerHTML = videoDevices.map(device => 
                    `<option value="${device.deviceId}">${device.label || 'Camera ' + device.deviceId}</option>`
                ).join('');
                
                if (videoDevices.length > 0) startStream(videoDevices[0].deviceId);
            } catch (err) {
                console.error("카메라를 찾을 수 없습니다.", err);
            }
        }

        async function startStream(deviceId) {
            const constraints = {
                video: { deviceId: deviceId ? { exact: deviceId } : undefined, width: 1280, height: 720 }
            };
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = stream;
        }

        cameraSelect.onchange = () => startStream(cameraSelect.value);

        // 촬영 로직 (간격을 파라미터로 받음)
        async function startShoot(intervalSec) {
            if (isShooting) return;
            isShooting = true;

            for (let i = 0; i < 4; i++) {
                let timeLeft = intervalSec;
                
                await new Promise(resolve => {
                    const timer = setInterval(() => {
                        countdownEl.style.display = 'block';
                        countdownEl.innerText = timeLeft;
                        if (timeLeft <= 0) {
                            clearInterval(timer);
                            countdownEl.style.display = 'none';
                            takePhoto(i + 1);
                            resolve();
                        }
                        timeLeft--;
                    }, 1000);
                });
            }
            
            setTimeout(() => {
                saveFinalImage();
                alert("촬영 완료! 와우! 멋진 사진이군요!.");
                isShooting = false;
            }, 500);
        }

        function takePhoto(index) {
            const canvas = document.getElementById('canvas');
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            context.translate(canvas.width, 0);
            context.scale(-1, 1);
            context.drawImage(video, 0, 0, canvas.width, canvas.height);

            const data = canvas.toDataURL('image/png');
            document.getElementById('pic' + index).src = data;
        }

        // 전체 네 컷 프레임을 하나로 합쳐서 저장하는 함수
        function saveFinalImage() {
            const finalCanvas = document.getElementById('finalCanvas');
            const ctx = finalCanvas.getContext('2d');
            
            // 실제 출력 사이즈 설정 (결과물 섹션 비율에 맞춤)
            const padding = 40;
            const slotGap = 20;
            const imgWidth = 600;
            const imgHeight = 400; // 3:2 비율
            
            finalCanvas.width = imgWidth + (padding * 2);
            finalCanvas.height = (imgHeight * 4) + (slotGap * 3) + (padding * 2) + 100;

            // 배경 그리기 (흰색 프레임)
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, finalCanvas.width, finalCanvas.height);

            // 4개 이미지 그리기
            for (let i = 1; i <= 4; i++) {
                const img = document.getElementById('pic' + i);
                const yPos = padding + ((i - 1) * (imgHeight + slotGap));
                ctx.drawImage(img, padding, yPos, imgWidth, imgHeight);
            }

            // 하단 텍스트 추가
            ctx.fillStyle = "#999";
            ctx.font = "italic 30px serif";
            ctx.textAlign = "center";
            ctx.fillText("2026 MEMORIES", finalCanvas.width / 2, finalCanvas.height - 50);

            // 자동 다운로드
            const link = document.createElement('a');
            link.download = `four-cuts-${Date.now()}.png`;
            link.href = finalCanvas.toDataURL('image/png');
            link.click();
        }

        getCameras();
    </script>
</body>
</html>
